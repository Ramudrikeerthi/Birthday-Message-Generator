<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Birthday Message Generator 🎂</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
<style>
body {
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    font-family: 'Poppins', sans-serif;
}

.card {
    border-radius: 20px;
}

button {
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background-color: #fff;
    top: 0;
    opacity: 0.7;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
        opacity: 0;
    }
}
</style>
</head>
<body>

<div class="container text-center mt-5">
    <div class="card shadow p-4">

        <h2 class="mb-3">🎉 Birthday Message Generator 🎉</h2>

        <!-- Birthday Input -->
        <input type="date" id="birthday" class="form-control mb-3">

        <!-- Message Type -->
        <select id="type" class="form-select mb-3">
            <option value="nice">Nice Message 😊</option>
            <option value="tease">Funny/Tease 😜</option>
        </select>

        <!-- Button -->
        <button class="btn btn-primary" onclick="generateMessage()">
            Generate Message
        </button>

        <!-- Output -->
        <div id="result" class="mt-4 alert alert-success d-none"></div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
